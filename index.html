<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reading Rascals</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,600&display=swap" rel="stylesheet" />
<style>
  :root{
    /* purples & pinks */
    --lav-bg:#F2ECFF;
    --lav-2:#E7DBFF;
    --lav-3:#D9C9FF;
    --purple:#7C5CFC;
    --purple-deep:#5B33D6;
    --purple-ink:#3C2A6E;
    --pink:#FF5BA0;
    --pink-deep:#F0388A;
    --pink-soft:#FFD6EC;
    --pink-soft-2:#FFE9F4;
    --gold:#FFC23D;
    --gold-deep:#F1A21B;
    --mint:#5AD6B0;
    --sky:#54C7F2;
    --ink:#3A2D5F;
    --ink-soft:#6F5E97;
    /* fixed light tones for headings that sit directly on the dark cosmic bg */
    --head-on-bg:#F4ECFF;
    --head-on-bg-soft:rgba(236,224,255,.72);
    --white:#FFFFFF;
    --card:#FFFFFF;
    --ok:#36C28B;
    --ok-deep:#1FA873;

    --r-lg:30px;
    --r-md:22px;
    --r-sm:16px;
    --shadow-card:0 18px 40px -18px rgba(91,51,214,.45);
    --shadow-btn:0 8px 0 0 var(--pink-deep);
    --shadow-btn-purple:0 8px 0 0 var(--purple-deep);
    --shadow-soft:0 10px 30px -12px rgba(91,51,214,.4);

    --font-display:'Fredoka', system-ui, sans-serif;
    --font-body:'Nunito', system-ui, sans-serif;

    /* themeable background (driven by Tweaks) — dark cosmic, sampled from the mascot badge */
    --bg-base:#1C1046;
    --bg-glow-1:#C42E96;
    --bg-glow-2:#7A3AE6;
    --bg-glow-3:#3A2270;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; height:100%; }
  body{
    font-family:var(--font-body);
    color:var(--ink);
    background:
      radial-gradient(820px 560px at 14% 4%, var(--bg-glow-1) 0%, transparent 46%),
      radial-gradient(900px 680px at 96% 98%, var(--bg-glow-2) 0%, transparent 48%),
      radial-gradient(1300px 950px at 50% 32%, var(--bg-glow-3) 0%, var(--bg-base) 70%),
      var(--bg-base);
    background-attachment:fixed;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  #root{ min-height:100%; }

  h1,h2,h3,.display{ font-family:var(--font-display); font-weight:600; letter-spacing:.2px; }

  /* floating soft blobs */
  .bg-decor{ position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .blob{ position:absolute; border-radius:50%; filter:blur(2px); opacity:.5; }

  button{ font-family:var(--font-display); cursor:pointer; border:none; }

  /* scrollbar */
  *::-webkit-scrollbar{ width:12px; height:12px; }
  *::-webkit-scrollbar-thumb{ background:var(--lav-3); border-radius:20px; border:3px solid transparent; background-clip:content-box; }
  *::-webkit-scrollbar-track{ background:transparent; }

  /* shared animation helpers */
  @keyframes pop-in{ 0%{ transform:scale(.6); opacity:0; } 70%{ transform:scale(1.06); } 100%{ transform:scale(1); opacity:1; } }
  @keyframes float-y{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-10px); } }
  @keyframes wiggle{ 0%,100%{ transform:rotate(-3deg); } 50%{ transform:rotate(3deg); } }
  @keyframes bob{ 0%,100%{ transform:translateY(0) rotate(0); } 50%{ transform:translateY(-6px) rotate(-1.5deg); } }
  @keyframes rise{ from{ transform:translateY(22px); opacity:0; } to{ transform:translateY(0); opacity:1; } }
  @keyframes sheen{ to{ background-position:200% center; } }
  @keyframes confetti-fall{ to{ transform:translateY(105vh) rotate(720deg); opacity:1; } }
  @keyframes star-pop{ 0%{ transform:scale(0) rotate(-40deg); } 60%{ transform:scale(1.25) rotate(8deg); } 100%{ transform:scale(1) rotate(0); } }
  @keyframes pulse-ring{ 0%{ box-shadow:0 0 0 0 rgba(255,91,160,.45); } 100%{ box-shadow:0 0 0 22px rgba(255,91,160,0); } }
  @keyframes twinkle{ 0%,100%{ opacity:.35; transform:scale(.8); } 50%{ opacity:1; transform:scale(1.15); } }
  @keyframes remy-wave{ 0%,100%{ transform:rotate(-8deg); } 50%{ transform:rotate(22deg); } }
  @keyframes remy-waggle{ 0%,100%{ transform:rotate(-3deg); } 50%{ transform:rotate(3deg); } }
  @keyframes bubble-in{ 0%{ opacity:0; transform:translateY(10px) scale(.92); } 100%{ opacity:1; transform:translateY(0) scale(1); } }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; }
  }

  /* ===== sentence highlight during narration ===== */
  .narr-sentence{ transition:background .2s, color .2s; border-radius:6px; padding:1px 2px; }
  .narr-active{ background:linear-gradient(transparent 55%, #FFE07A 55%); box-shadow:0 0 0 3px #FFE07A; color:var(--purple-ink); }

  /* ===== printable worksheet ===== */
  .print-area{ display:none; }
  .ws-doc{ font-family:Georgia,'Times New Roman',serif; color:#1a1a1a; }
  .ws-page{ page-break-after:always; position:relative; }
  /* faint brand watermark in the lower-right corner of every printed page */
  .ws-watermark{
    position:absolute; bottom:46px; right:0; transform:none;
    width:130px; max-width:130px; height:auto; opacity:0.10; z-index:0; pointer-events:none;
    -webkit-print-color-adjust:exact; print-color-adjust:exact;
  }
  .ws-page > *:not(.ws-watermark){ position:relative; z-index:1; }
  /* small brand mark in the page footer */
  .ws-footmark{ width:30px; height:30px; border-radius:50%; vertical-align:middle; margin-right:6px;
    -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .ws-page:last-child{ page-break-after:auto; }
  .ws-head{ display:flex; justify-content:space-between; align-items:baseline; border-bottom:3px solid #6E45EE; padding-bottom:8px; margin-bottom:12px; }
  .ws-brand{ font-family:'Fredoka',sans-serif; font-weight:700; font-size:16px; color:#5B33D6; white-space:nowrap; }
  .ws-meta{ font-size:12px; color:#555; font-family:'Nunito',sans-serif; }
  .ws-namerow{ display:flex; justify-content:space-between; font-size:13px; margin-bottom:14px; font-family:'Nunito',sans-serif; }
  .ws-title{ font-size:24px; margin:6px 0 10px; font-family:'Fredoka',sans-serif; color:#000; }
  .ws-passage p{ font-size:14px; line-height:1.7; margin:0 0 10px; }
  .ws-sec{ font-family:'Fredoka',sans-serif; font-size:17px; color:#5B33D6; border-left:5px solid #FF5BA0; padding-left:8px; margin:18px 0 8px; }
  .ws-list{ margin:0; padding-left:22px; }
  .ws-q{ margin-bottom:12px; break-inside:avoid; }
  .ws-qtext{ font-size:14px; font-weight:bold; font-family:'Nunito',sans-serif; }
  .ws-choices{ margin-top:5px; }
  .ws-choice{ font-size:13px; font-family:'Nunito',sans-serif; margin:3px 0; display:flex; align-items:center; gap:8px; }
  .ws-bub{ display:inline-grid; place-items:center; width:18px; height:18px; border:1.5px solid #6E45EE; border-radius:50%; font-size:11px; flex-shrink:0; }
  .ws-lines span{ display:block; border-bottom:1px solid #999; height:20px; margin-top:6px; }
  .ws-answerline{ margin-top:6px; font-size:13px; font-family:'Nunito',sans-serif; color:#333; }
  .ws-ans{ font-size:13px; color:#1a7f4f; font-weight:bold; font-family:'Nunito',sans-serif; margin-top:3px; }
  .ws-cue{ font-size:12px; color:#555; font-style:italic; font-family:'Nunito',sans-serif; }
  .ws-foot{ margin-top:20px; padding-top:8px; border-top:1px solid #ccc; font-size:10px; color:#888; text-align:center; font-family:'Nunito',sans-serif; }

  @media print {
    @page{ margin:14mm; }
    html, body{ background:#fff !important; }
    body *{ visibility:hidden; }
    .print-area, .print-area *{ visibility:visible; }
    .print-area{ display:block !important; position:absolute; left:0; top:0; width:100%; }
    .no-print{ display:none !important; }
    .ws-watermark{ opacity:0.12 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  }
</style>
</head>
<body>
  <div class="bg-decor no-print" id="bg-decor"></div>
  <div id="root"></div>
  <div id="tweaks-root" class="no-print"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    // cosmic star field — twinkling sparkles across the whole app
    (function(){
      const wrap = document.getElementById('bg-decor');
      const cols = ['#FFFFFF','#FF9BCB','#FFD36B','#C9A8FF'];
      const STAR = (c,s)=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" style="display:block;color:${c};filter:drop-shadow(0 0 6px ${c})"><path d="M12 0 C13 8 16 11 24 12 C16 13 13 16 12 24 C11 16 8 13 0 12 C8 11 11 8 12 0 Z" fill="${c}"/></svg>`;
      for(let i=0;i<40;i++){
        const c=cols[i%cols.length];
        const s=(6+Math.random()*11).toFixed(1);
        const star=document.createElement('div');
        star.innerHTML=STAR(c,s);
        const el=star.firstChild;
        el.style.position='absolute';
        el.style.left=(Math.random()*100).toFixed(1)+'%';
        el.style.top=(Math.random()*100).toFixed(1)+'%';
        el.style.animation='twinkle '+(2.6+Math.random()*2.6).toFixed(1)+'s ease-in-out '+(-Math.random()*4).toFixed(1)+'s infinite';
        wrap.appendChild(el);
      }
    })();
  </script>

// ====== SOUND: tiny Web-Audio synth (no asset files, works offline) ======
// A soft chime on button/tile taps, a happy arpeggio when a sticker is earned.

const SOUND_KEY = 'ppq_muted';
let _ac = null;
let _muted = (function(){ try { return localStorage.getItem(SOUND_KEY) === '1'; } catch(e){ return false; } })();

function isMuted(){ return _muted; }
function setMuted(v){
  _muted = !!v;
  try { localStorage.setItem(SOUND_KEY, _muted ? '1' : '0'); } catch(e){}
  if(!_muted){ ctx(); blip(880, 0.06, 'triangle', 0.12); } // little confirmation beep
}

// lazily create / resume the AudioContext (autoplay policies need a gesture)
function ctx(){
  try {
    if(!_ac){ const AC = window.AudioContext || window.webkitAudioContext; if(!AC) return null; _ac = new AC(); }
    if(_ac.state === 'suspended') _ac.resume();
    return _ac;
  } catch(e){ return null; }
}

// one shaped tone
function tone(freq, start, dur, { type='sine', gain=0.18, glideTo=null }={}){
  const ac = _ac; if(!ac) return;
  const t0 = ac.currentTime + start;
  const osc = ac.createOscillator();
  const g = ac.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if(glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, t0 + dur);

  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(gain, t0 + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

  osc.start(t0); osc.stop(t0 + dur + 0.02);

function playClick(){

// Big chunky button with 3D press
function BigButton({ children, onClick, color='pink', size='md', disabled, style={}, icon }){
  const [press, setPress] = useState(false);
  const palette = {
    pink:   { bg:'var(--pink)', sh:'var(--pink-deep)', fg:'#fff' },
    purple: { bg:'var(--purple)', sh:'var(--purple-deep)', fg:'#fff' },

    white:  { bg:'#fff', sh:'#E2D5FF', fg:'var(--purple-deep)' },
  }[color];
  const pads = { sm:'12px 20px', md:'16px 30px', lg:'20px 42px' }[size];
  const fs = { sm:17, md:21, lg:26 }[size];
  return (
    <button
      onMouseDown={()=>setPress(true)} onMouseUp={()=>setPress(false)}
      onMouseLeave={()=>setPress(false)}
      onClick={disabled?undefined:(e)=>{ try{ playClick(); }catch(_){ } onClick && onClick(e); }}
      disabled={disabled}
      style={{
        background:palette.bg, color:palette.fg, fontSize:fs, fontWeight:600,
        padding:pads, borderRadius:'999px',
        boxShadow:`0 ${press?2:8}px 0 0 ${palette.sh}`,

        transition:'transform .06s, box-shadow .06s, filter .15s',
        opacity:disabled?0.5:1, display:'inline-flex', alignItems:'center', gap:10,
        filter: disabled?'grayscale(.3)':'none', whiteSpace:'nowrap', ...style,
      }}>

      {children}
    </button>
  );
}

// Selectable tile (grade / story type / topic)
function ChoiceTile({ emoji, label, blurb, selected, onClick, color='purple', big }){
  const [hover, setHover] = useState(false);
  const accent = color==='pink' ? 'var(--pink)' : 'var(--purple)';
  return (
    <button
      onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      onClick={(e)=>{ try{ playClick(); }catch(_){ } onClick && onClick(e); }}
      style={{
        background:'#fff',
        border:`4px solid ${selected?accent:'#EFE7FF'}`,

        <span style={{ position:'absolute', top:-12, right:-10, background:accent, color:'#fff',

function StepBar({ stepIndex, totalSteps, onBack, labels }){

    <div style={{ display:'flex', alignItems:'center', gap:14, marginBottom:18 }}>

    </div>
  );

function GemPath({ total, earned }){
  return (
    <div style={{ display:'flex', alignItems:'center', gap:6, flexWrap:'wrap' }}>
      {Array.from({length:total}).map((_,i)=>{
        const got = i<earned;
        return (
          <div key={i} style={{ display:'flex', alignItems:'center', gap:6 }}>
            <span style={{
              fontSize:22, filter: got?'none':'grayscale(1)', opacity: got?1:0.35,
              transform: got?'scale(1)':'scale(.85)', transition:'all .3s',
              animation: got?'star-pop .4s ease':'none' }}>💎</span>
          </div>
        );
      })}
    </div>
  );
}

// Confetti burst
function Confetti({ run }){
  const ref = useRef(null);
  useEffect(()=>{
    if(!run || !ref.current) return;
    const wrap = ref.current;
    const cols = ['#FF5BA0','#7C5CFC','#FFC23D','#5AD6B0','#54C7F2','#FF9BC9'];
    for(let i=0;i<70;i++){
      const p=document.createElement('div');
      const sz=8+Math.random()*10;
      p.style.cssText=`position:absolute;top:-20px;left:${Math.random()*100}%;
        width:${sz}px;height:${sz*0.6}px;background:${cols[i%cols.length]};
        border-radius:2px;opacity:0;transform:rotate(${Math.random()*360}deg);
        animation:confetti-fall ${1.8+Math.random()*1.6}s ${Math.random()*0.6}s ease-in forwards;`;
      wrap.appendChild(p);
    }
    const t=setTimeout(()=>{ if(wrap) wrap.innerHTML=''; }, 4200);
    return ()=>clearTimeout(t);
  },[run]);
  return <div ref={ref} style={{ position:'fixed', inset:0, pointerEvents:'none', zIndex:90, overflow:'hidden' }} />;
}

function Stage({ children, maxWidth=760 }){
  return (
    <div style={{ position:'relative', zIndex:1, minHeight:'100vh', display:'flex',

      <div style={{ width:'100%', maxWidth, animation:'rise .4s ease both' }}>
        {children}
      </div>
    </div>
  );
}

  return (
    <div style={{ display:'flex', gap:8 }}>
      {[0,1,2].map(i=>(
        <span key={i} style={{ width:14, height:14, borderRadius:'50%', background:'var(--pink)',
          animation:`float-y 0.7s ease-in-out ${i*0.15}s infinite` }} />
      ))}
    </div>
  );
}

  BigButton, ChoiceTile, StepBar, Panel, SpeechBubble, GemPath, Confetti, Stage, LoadingDots,

    if(out.length>=k) break;
  }
  return out;
}
// build an MC question object with the correct answer shuffled among distractors
function mcQuestion(type, q, correct, distractors, cue){
  const opts = shuffled([correct, ...distractors.slice(0,3)]);
  return { type, kind:'mc', q, choices:opts, answer:opts.indexOf(correct), cue };
}
function openQuestion(type, q, model, cue){
  return { type, kind:'open', q, answer:model, cue };
}

// ---------- shared pools ----------
const SG_FEELINGS = ['proud','happy','excited','joyful','cheerful','grateful','brave','glad'];
const SG_TRAITS   = ['brave','curious','kind','clever','cheerful','gentle','bold','friendly'];
const SG_OPENERS  = ['One day','One sunny morning','One bright day','Early one morning','One afternoon'];
const SG_PROBLEM_CONN = ['But','The trouble was','But soon','One problem was'];
const SG_HELP_CONN    = ['Then','Soon','Just then','Luckily','After a while'];
const SG_WRONG_MAIN = [
  'A child who loses a favorite toy at the park',
  'A robot who learns how to dance',
  'A cook who burns the birthday soup',
  'A team that misses the school bus',
  'A cat who is scared of a tiny mouse',
  'A wizard who forgets a magic word',
];
const SG_WRONG_THEME = [
  'Everyone should eat more vegetables at dinner.',
  'The best color in the whole world is blue.',
  'Soccer is much harder to play than baseball.',
  'Computers were invented a very long time ago.',
  'Rainy days are always better than sunny days.',
  'Music sounds best when it is played very loud.',
];

// =====================================================================
// PASSAGE BUILDERS
// =====================================================================

// ---- FICTION ----
function buildFiction(grade, topicId){
  const band = gradeBand(grade);
  const pack = (window.FICTION_PACKS||{})[topicId] || (window.FICTION_PACKS||{}).animals;
  const hero    = choice(pack.heroes);
  const trait   = choice(SG_TRAITS);
  const setting = choice(pack.settings);
  const ep      = choice(pack.episodes);
  const feeling = ep.feeling || choice(SG_FEELINGS);
  const Name = hero.name;

  const fill = (s)=> String(s).replace(/\[NAME\]/g, Name).replace(/\[KIND\]/g, hero.kind);

  // core beats as full sentences
  const sIntro = `${Name} was a ${trait} ${hero.kind} who lived ${setting.prose}.`;
  const sWant  = `${Name} ${fill(ep.want)}.`;
  const sTrig  = `${choice(SG_OPENERS)}, ${Name} ${fill(ep.trigger)}.`;
  const sProb  = `${choice(SG_PROBLEM_CONN)} ${fill(ep.problem)}.`;
  const sHelp  = `${choice(SG_HELP_CONN)} ${fill(ep.help)}.`;
  const sSolve = `${Name} ${fill(ep.solution)}, and felt very ${feeling}.`;
  const sDetail = ep.detail ? cap(fill(ep.detail)) : '';
  const sExtra  = ep.extra  ? cap(fill(ep.extra))  : '';
  const sClose  = `From that day on, ${Name} knew that ${fill(ep.lesson)}.`;
  const sVocab  = ep.vocab ? cap(fill(ep.vocab.sentence)) : '';

  let paragraphs;
  if(band==='early'){
    paragraphs = [[sIntro, sWant, sTrig, sProb, sHelp, sSolve].join(' ')];
  } else if(band==='mid'){
    paragraphs = [
      [sIntro, sWant, sDetail].filter(Boolean).join(' '),
      [sTrig, sProb, sHelp, sSolve, sClose].join(' '),
    ];
  } else {
    paragraphs = [
      [sIntro, sWant, sDetail].filter(Boolean).join(' '),
      [sTrig, sProb].join(' '),
      [sHelp, sSolve, sExtra].filter(Boolean).join(' '),
      [sVocab, sClose].filter(Boolean).join(' '),
    ];
  }

  const title = fill(choice(ep.titles || [`${Name}'s Big Day`]));
  const meta = { genre:'fiction', band, hero, trait, setting, ep, feeling, vocab:(band==='upper'?ep.vocab:null) };
  return { title, paragraphs, meta };
}

function buildFictionComp(meta, plan){
  const { hero, setting, ep, feeling } = meta;
  const pool = window.HERO_POOL || [];
  const otherHeroes = distractorsFrom(pool.map(h=>`${h.name} the ${h.kind}`), `${hero.name} the ${hero.kind}`, 3);
  const otherSettings = distractorsFrom((window.SETTING_LABELS||[]), setting.label, 3);
  const otherFeelings = distractorsFrom(SG_FEELINGS, feeling, 3);
  const fill = (s)=> String(s).replace(/\[NAME\]/g, hero.name).replace(/\[KIND\]/g, hero.kind);

  const slots = [
    { t:'who',
      q:'Who is the main character in the story?',
      correct:`${hero.name} the ${hero.kind}`, distractors:otherHeroes,
      open:`The main character is ${hero.name} the ${hero.kind}.`,
      cue:'Go back and find who the story is about.' },
    { t:'detail',
      q:'Where does the story take place?',
      correct:setting.label, distractors:otherSettings,
      open:`The story takes place ${setting.prose}.`,
      cue:'What sentence tells you where they are?' },
    { t:'main',
      q:'What is this story mostly about?',
      correct:`A ${hero.kind} who ${fill(ep.mainIdea)}`, distractors:sample(SG_WRONG_MAIN,3),
      open:`It is mostly about a ${hero.kind} who ${fill(ep.mainIdea)}.`,
      cue:'What was the most important part?' },
    { t:'inference',
      q:`How did ${hero.name} feel at the end of the story?`,
      correct:feeling, distractors:otherFeelings,
      open:`${hero.name} felt ${feeling} at the end.`,
      cue:'Think about what happened — how would that feel?' },
    { t:'why',
      q:fill(ep.why.q),
      correct:fill(ep.why.a), distractors:(ep.why.distractors||[]).map(fill),
      open:fill(ep.why.a),
      cue:'Find the part that shows why.' },
  ];
  return slots.map((s,i)=> plan[i]==='open'
    ? openQuestion(s.t, s.q, s.open, s.cue)
    : mcQuestion(s.t, s.q, s.correct, s.distractors, s.cue));
}

// ---- NON-FICTION ----
function buildNonfiction(grade, topicId){
  const band = gradeBand(grade);
  const pack = (window.NONFICTION_PACKS||{})[topicId] || (window.NONFICTION_PACKS||{}).animals;
  const subj = choice(pack.subjects);
  const nFacts = band==='early' ? 4 : band==='mid' ? 5 : 6;

  // always include questionable facts first so comprehension has material
  const qFacts = subj.facts.filter(f=>f.q);
  const plain  = subj.facts.filter(f=>!f.q);
  const usedQ  = sample(qFacts, Math.min(qFacts.length, Math.max(2, nFacts-2)));
  const fillN  = Math.max(0, nFacts - usedQ.length);
  const usedPlain = sample(plain.length?plain:qFacts, fillN);
  const used = shuffled([...usedQ, ...usedPlain]).slice(0,nFacts);

  const intro = `${subj.intro}`;
  const factText = used.map(f=>f.text).join(' ');
  let paragraphs;
  if(band==='early'){
    paragraphs = [[intro, factText].join(' ')];
  } else if(band==='mid'){
    const half = Math.ceil(used.length/2);
    paragraphs = [
      [intro, ...used.slice(0,half).map(f=>f.text)].join(' '),
      used.slice(half).map(f=>f.text).join(' '),
    ];
  } else {
    const third = Math.ceil(used.length/3);
    paragraphs = [
      [intro, ...used.slice(0,third).map(f=>f.text)].join(' '),
      used.slice(third, third*2).map(f=>f.text).join(' '),
      used.slice(third*2).map(f=>f.text).join(' '),
    ];
    if(subj.closer) paragraphs.push(subj.closer);
  }

  const title = choice(subj.titles || [subj.label]);
  const meta = { genre:'nonfiction', band, subj, usedQ:usedQ.filter(f=>f.q) };
  return { title, paragraphs, meta };
}

function buildNonfictionComp(meta, plan){
  const { subj, usedQ } = meta;
  const siblingLabels = distractorsFrom((window.SUBJECT_LABELS||[]), subj.label, 3);
  const detailFact = usedQ.length ? choice(usedQ) : (subj.facts.filter(f=>f.q)[0]);
  const slots = [
    { t:'who',
      q:'What is this passage mostly about?',
      correct:subj.label, distractors:siblingLabels,
      open:`It is mostly about ${subj.label.toLowerCase()}.`,
      cue:'Look at the title and the first sentence.' },
    { t:'detail',
      q:detailFact.q, correct:detailFact.a, distractors:detailFact.distractors,
      open:detailFact.a,
      cue:'Go back and find that exact fact in the passage.' },
    { t:'main',
      q:'Which sentence tells the BIG idea of the passage?',
      correct:subj.theme, distractors:sample(SG_WRONG_THEME,3),
      open:subj.theme,
      cue:'What is the one idea all the facts support?' },
    { t:'inference',
      q:subj.inference.q, correct:subj.inference.a, distractors:subj.inference.distractors,
      open:subj.inference.a,
      cue:'Use the facts to figure out something not said directly.' },
    { t:'vocab',
      q:`In this passage, what does the word "${subj.vocab.word}" mean?`,
      correct:subj.vocab.meaning, distractors:subj.vocab.distractors,
      open:`"${subj.vocab.word}" means ${subj.vocab.meaning}.`,
      cue:`Find "${subj.vocab.word}" in the passage and read around it.` },
  ];
  return slots.map((s,i)=> plan[i]==='open'
    ? openQuestion(s.t, s.q, s.open, s.cue)
    : mcQuestion(s.t, s.q, s.correct, s.distractors, s.cue));
}

const PHON_NOTE = {
  substitution:'Cue: "What sound is at the front? Switch it."',
  deletion:'Cue: "Say it slowly, then leave off that sound."',
  addition:'Cue: "Put the new sound in front, then blend."',
  blending:'Cue: "Say the sounds faster until they join."',
  manipulation:'Cue: "Keep the other sounds — just change the middle."',
};
const BAND_ORDER = { early:['early'], mid:['early','mid'], upper:['mid','upper','early'] };

function buildPhonemic(passage, grade, source){
  const band = gradeBand(grade);
  const allowed = BAND_ORDER[band] || ['early'];
  const passageWords = new Set(passage.paragraphs.join(' ').toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/));
  const skills = ['substitution','deletion','addition','blending','manipulation'];

  return skills.map(skill=>{
    let items = PHONEME_BANK[skill].filter(it=> allowed.includes(it.band));
    if(!items.length) items = PHONEME_BANK[skill];
    // when therapist asks to draw from the passage, prefer items whose target word appears in it
    if(source==='passage'){
      const inPassage = items.filter(it=> it.word && passageWords.has(it.word.toLowerCase()));
      if(inPassage.length) items = inPassage;
    }
    const it = choice(items);
    return {
      skill,
      prompt: it.prompt,
      answer: it.answer,
      note: `Accept "${it.answer}". ${PHON_NOTE[skill]}`,
    };
  });
}

// MASTER (offline) — drop-in replacement for the old AI generateActivity
// =====================================================================
function offlineGenerateActivity({ grade, type, topic, questionMode, phonSource }){
  const isFic = type==='fiction';
  const built = isFic ? buildFiction(grade, topic) : buildNonfiction(grade, topic);
  const plan = questionPlan(grade, questionMode);
  const comprehension = isFic
    ? buildFictionComp(built.meta, plan)
    : buildNonfictionComp(built.meta, plan);
  const phonemic = buildPhonemic(built, grade, phonSource);
  return {
    title: built.title,
    paragraphs: built.paragraphs,
    comprehension,
    phonemic,
    grade, type, topic,
    fromFallback:false,
  };
}

Object.assign(window, { offlineGenerateActivity, buildFiction, buildNonfiction, buildPhonemic });

// ====== ACTIVITY GENERATION (fully offline — runs in the browser) ======
// Stories, comprehension questions, and phonemic tasks are built entirely on the
// device by the offline engine in storygen.jsx + the content packs in
// story-fiction.jsx / story-nonfiction.jsx. A brand-new, grade- and topic-matched
// activity is produced on every press. No server or AI connection is required,
// so it works the same on GitHub Pages as it does anywhere else.

// Decides the mix of multiple-choice vs. open-response questions by grade + mode.
function questionPlan(grade, mode){
  const band = gradeBand(grade);
  if(mode==='mc')   return ['mc','mc','mc','mc','mc'];
  if(mode==='open') return ['open','open','open','open','open'];
  // auto: more open-ended responses as the grade goes up
  if(band==='early') return ['mc','mc','mc','mc','mc'];
  if(band==='mid')   return ['mc','mc','mc','mc','open'];
  return ['mc','mc','mc','open','open'];
}

// Master generate: returns a full activity object. Always succeeds offline;
// only drops to the static FALLBACK if something is truly misconfigured.
async function generateActivity({ grade, type, topic, questionMode, phonSource }){
  try {
    if(typeof offlineGenerateActivity === 'function'){
      return offlineGenerateActivity({ grade, type, topic, questionMode, phonSource });
    }
  } catch(e){ console.warn('offline generation failed', e); }
  return { ...FALLBACK, grade, type, topic, fromFallback:true };
}

Object.assign(window, { generateActivity, questionPlan });

// ====== AUDIO NARRATION (Web Speech API) ======

// Pick the friendliest available voice (default system voices can sound robotic/eerie).
let _voicesWarm = null;
function pickFriendlyVoice(){
  try {
    if(!('speechSynthesis' in window)) return null;
    const voices = window.speechSynthesis.getVoices() || [];
    if(!voices.length) return null;
    const en = voices.filter(v => /^en(-|_|$)/i.test(v.lang || ''));
    const pool = en.length ? en : voices;
    // warm, natural-sounding voices first; avoid the novelty/robotic ones
    const prefer = ['samantha','google us english','google uk english female','karen','tessa',
      'victoria','moira','fiona','serena','allison','ava','susan','zira','aria','jenny','nicky','female'];
    const avoid = /albert|zarvox|bad news|bahh|bells|boing|bubbles|cellos|deranged|hysterical|trinoids|whisper|wobble|organ|superstar|junior|fred|ralph|kathy/i;
    const clean = pool.filter(v => !avoid.test(v.name || ''));
    // 1) modern "Natural"/"Online" neural voices sound the friendliest — prefer female-leaning ones
    const naturalFemale = clean.find(v => /natural|online/i.test(v.name) && /aria|jenny|emma|michelle|ava|sonia|libby|clara|female/i.test(v.name));
    if(naturalFemale) return naturalFemale;
    const anyNatural = clean.find(v => /natural|online/i.test(v.name) && !/guy|david|mark|brian|ryan|male/i.test(v.name));
    if(anyNatural) return anyNatural;
    // 2) known warm system voices
    for(const want of prefer){
      const hit = clean.find(v => (v.name || '').toLowerCase().includes(want));
      if(hit) return hit;
    }
    const local = clean.find(v => v.localService) || clean[0];
    return local || pool[0] || null;
  } catch(e){ return null; }
}
function warmVoice(){
  if(_voicesWarm) return _voicesWarm;
  _voicesWarm = pickFriendlyVoice();
  return _voicesWarm;
}
// voices often load async — refresh the cached pick when they arrive
try {
  if(typeof window !== 'undefined' && 'speechSynthesis' in window){
    window.speechSynthesis.onvoiceschanged = () => { _voicesWarm = pickFriendlyVoice(); };
  }
} catch(e){}

// split paragraphs into sentences with global indices for highlighting
function buildSentences(paragraphs){
  const byPara = []; const flat = []; let gi = 0;
  (paragraphs||[]).forEach(p=>{
    const parts = String(p).match(/[^.!?]+[.!?]+["”’)]?\s*|[^.!?]+$/g) || [String(p)];
    const row = parts.filter(t=>t.trim()).map(t=>{ const obj = { gi, text:t }; flat.push(t.trim()); gi++; return obj; });
    byPara.push(row);
  });
  return { byPara, flat };
}

function useNarrator(flat){
  const [active, setActive] = useState(-1);
  const [status, setStatus] = useState('idle'); // idle | playing | paused
  const rateRef = useRef(0.85);
  const runRef = useRef(0);
  const idxRef = useRef(0);
  const supported = typeof window!=='undefined' && 'speechSynthesis' in window;

  function speakFrom(i){
    const run = runRef.current;
    if(i>=flat.length){ setStatus('idle'); setActive(-1); idxRef.current=0; return; }
    idxRef.current = i; setActive(i); setStatus('playing');
    const u = new SpeechSynthesisUtterance(flat[i]);
    u.rate = rateRef.current; u.pitch = 1.0;
    const v = warmVoice(); if(v){ u.voice = v; u.lang = v.lang; }
    u.onend = ()=>{ if(runRef.current!==run) return; speakFrom(i+1); };
    u.onerror = ()=>{ if(runRef.current!==run) return; setStatus('idle'); setActive(-1); };
    try { window.speechSynthesis.speak(u); } catch(e){ setStatus('idle'); }
  }
  function play(){
    if(!supported) return;
    if(status==='paused'){ try{ window.speechSynthesis.resume(); }catch(e){} setStatus('playing'); return; }
    runRef.current++; window.speechSynthesis.cancel();
    setTimeout(()=>speakFrom(0), 60);
  }
  function pause(){ if(!supported) return; try{ window.speechSynthesis.pause(); }catch(e){} setStatus('paused'); }
  function stop(){ if(!supported) return; runRef.current++; try{ window.speechSynthesis.cancel(); }catch(e){} setStatus('idle'); setActive(-1); idxRef.current=0; }
  function setRate(r){
    rateRef.current = r;
    if(status==='playing'){ runRef.current++; window.speechSynthesis.cancel(); const from=idxRef.current; setTimeout(()=>speakFrom(from), 60); }
  }
  useEffect(()=>()=>{ runRef.current++; if(supported){ try{ window.speechSynthesis.cancel(); }catch(e){} } },[]);
  return { active, status, play, pause, stop, setRate, rate:rateRef.current, supported };
}

// Narration control bar
function NarratorBar({ narrator }){
  const { status, play, pause, stop, setRate, supported } = narrator;
  const [slow, setSlow] = useState(false);
  if(!supported) return null;
  const playing = status==='playing';
  function toggleSpeed(){ const next=!slow; setSlow(next); setRate(next?0.6:0.85); }
  return (

  } catch(e){ return false; }
}

const ACTIVE_KEY = 'ppq_active_student';

  { color: '#5E6BE0', glow: '#B6BEFF', emoji: '🐳' },
  { color: '#C42E96', glow: '#FF8FD6', emoji: '🐙' },
];

function uid(){ return 's' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function loadRoster(){
  try { const r = JSON.parse(localStorage.getItem(ROSTER_KEY) || 'null'); if (Array.isArray(r)) return r; } catch(e){}
  return [];

function getActiveId(){ try { return localStorage.getItem(ACTIVE_KEY) || ''; } catch(e){ return ''; } }
function setActiveId(id){ try { id ? localStorage.setItem(ACTIVE_KEY, id) : localStorage.removeItem(ACTIVE_KEY); } catch(e){} }

function getActiveStudent(){ const id = getActiveId(); return loadRoster().find(s => s.id === id) || null; }

function addStudent(name){
  const roster = loadRoster();
  const avatar = AVATARS[roster.length % AVATARS.length];

// ====== PROGRESS / SAVE ACROSS SESSIONS ======

const PKEY = 'ppq_progress';
const SKEY = 'ppq_session';
// per-student namespaced keys (falls back to base key when no one is signed in)
function pKey(){ return (typeof studentKey === 'function') ? studentKey(PKEY) : PKEY; }
function sKey(){ return (typeof studentKey === 'function') ? studentKey(SKEY) : SKEY; }

function defaultProgress(){ return { lifetimeGems:0, quests:0, bestStars:0, goldBadges:0, stickers:[], lastPlayed:null }; }
function loadProgress(){
  try { const p = JSON.parse(localStorage.getItem(pKey())||'null'); if(p) return { ...defaultProgress(), ...p }; } catch(e){}
  return defaultProgress();
}
function saveProgress(p){ try { localStorage.setItem(pKey(), JSON.stringify(p)); } catch(e){} }

// read a specific student's saved progress by id (for the teacher dashboard)
function loadProgressFor(id){
  try { const p = JSON.parse(localStorage.getItem(PKEY + '__' + id)||'null'); if(p) return { ...defaultProgress(), ...p }; } catch(e){}
  return defaultProgress();
}

// record a finished quest; returns updated progress + the new sticker
function commitQuest({ gems, stars, grade, type, topic }){
  const p = loadProgress();
  p.lifetimeGems += gems;
  p.quests += 1;
  p.bestStars = Math.max(p.bestStars, stars);
  if(stars>=3) p.goldBadges += 1;
  const sticker = { topic, stars, grade, type, date:Date.now() };
  p.stickers.unshift(sticker);
  if(p.stickers.length>40) p.stickers = p.stickers.slice(0,40);
  p.lastPlayed = Date.now();
  saveProgress(p);
  return { progress:p, sticker };
}

// ---- session resume ----
function saveSession(sess){ try { localStorage.setItem(sKey(), JSON.stringify(sess)); } catch(e){} }
function loadSession(){ try { return JSON.parse(localStorage.getItem(sKey())||'null'); } catch(e){ return null; } }
function clearSession(){ try { localStorage.removeItem(sKey()); } catch(e){} }

// ---- Sticker Book view ----
function StickerBook({ onClose, onStart }){
  const p = loadProgress();
  const has = p.stickers.length>0;
  const topicEmoji = id => { const t=TOPICS.find(x=>x.id===id); return t?t.emoji:'⭐'; };
  return (
    <Stage maxWidth={720}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
        <button onClick={onClose} style={{ background:'#fff', color:'var(--purple)', borderRadius:999,
          padding:'10px 18px 10px 14px', boxShadow:'var(--shadow-soft)', fontSize:16, display:'flex', alignItems:'center', gap:8 }}>← Back</button>
        <h2 className="display" style={{ color:'var(--head-on-bg)', fontSize:'clamp(22px,3.4vw,30px)', margin:0, whiteSpace:'nowrap' }}>My Sticker Book</h2>
        <div style={{ width:80 }} />
      </div>

      {/* stat cards */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12, marginBottom:18 }}>
        <StatCard emoji="💎" value={p.lifetimeGems} label="Gems collected" color="var(--pink-deep)" />
        <StatCard emoji="📚" value={p.quests} label="Quests finished" color="var(--purple)" />
        <StatCard emoji="🏅" value={p.goldBadges} label="Gold badges" color="var(--gold-deep)" />
      </div>

      <Panel>
        <h3 className="display" style={{ color:'var(--purple-ink)', fontSize:20, margin:'0 0 14px' }}>My Stickers</h3>
        {has ? (
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(92px,1fr))', gap:12 }}>
            {p.stickers.map((s,i)=>(

// ====== TEACHER DASHBOARD: password-gated class progress (this device) ======
// Reads every roster student's saved progress from this device's storage.
// NOTE: only reflects activity on THIS device — home-device progress is not synced.

function fmtAgo(ts){
  if(!ts) return 'No activity yet';
  const d = Date.now() - ts;
  const min = Math.round(d/60000), hr = Math.round(d/3600000), day = Math.round(d/86400000);
  if(min < 1) return 'Just now';
  if(min < 60) return min + (min===1?' min ago':' mins ago');
  if(hr < 24) return hr + (hr===1?' hr ago':' hrs ago');
  if(day < 7) return day + (day===1?' day ago':' days ago');
  try { return new Date(ts).toLocaleDateString(undefined, { month:'short', day:'numeric' }); } catch(e){ return ''; }
}

function typeLabel(t){ return t==='fiction' ? 'Fiction' : t==='nonfiction' ? 'Non-fiction' : (t||''); }
function topicEmojiFor(id){ const t = (typeof TOPICS!=='undefined') && TOPICS.find(x=>x.id===id); return t ? t.emoji : '⭐'; }
function topicLabelFor(id){ const t = (typeof TOPICS!=='undefined') && TOPICS.find(x=>x.id===id); return t ? t.label : id; }

function TeacherDashboard({ onClose }){
  const roster = loadRoster();

    .map(s => ({ student:s, p:loadProgressFor(s.id) }))
    .sort((a,b) => (b.p.lastPlayed||0) - (a.p.lastPlayed||0));

  const totals = rows.reduce((acc,r)=>{
    acc.quests += r.p.quests||0;
    acc.gems += r.p.lifetimeGems||0;
    acc.gold += r.p.goldBadges||0;

        <div style={{ width:90 }} />
      </div>
      <p style={{ textAlign:'center', color:'var(--head-on-bg-soft)', fontSize:14, margin:'0 0 18px' }}>

      {/* class totals */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12, marginBottom:18 }}>
        <StatCard emoji="🧒" value={rows.length} label="Readers" color="var(--purple)" />
        <StatCard emoji="📚" value={totals.quests} label="Quests done" color="var(--pink-deep)" />
        <StatCard emoji="💎" value={totals.gems} label="Gems" color="var(--purple)" />
        <StatCard emoji="🏅" value={totals.gold} label="Gold badges" color="var(--gold-deep)" />
      </div>

      {rows.length === 0 ? (
        <Panel>
          <div style={{ textAlign:'center', padding:'24px 10px', color:'var(--ink-soft)' }}>
            <div style={{ fontSize:46, marginBottom:8 }}>🧑‍🏫</div>
            <p style={{ fontSize:18, fontFamily:'var(--font-display)', margin:0, color:'var(--purple-ink)' }}>No readers yet</p>
            <p style={{ fontSize:15, margin:'4px 0 0' }}>Add a reader on the sign-in screen, then their progress shows up here.</p>
          </div>
        </Panel>
      ) : (
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          {rows.map(({ student:s, p }) => {
            const open = openId === s.id;
            const active = p.quests > 0 || p.lastPlayed;
            return (
              <div key={s.id} style={{ background:'#fff', borderRadius:'var(--r-md)', boxShadow:'var(--shadow-card)', overflow:'hidden' }}>
                <button onClick={()=>setOpenId(open ? null : s.id)}
                  style={{ width:'100%', display:'flex', alignItems:'center', gap:14, padding:'14px 16px', textAlign:'left', background:'transparent', cursor:'pointer' }}>
                  <StudentAvatar student={s} size={50} />
                  <div style={{ flex:1, minWidth:0 }}>
                    <div className="display" style={{ fontSize:19, fontWeight:700, color:'var(--ink)',
                      overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{s.name}</div>
                    <div style={{ fontSize:13, color:'var(--ink-soft)', fontFamily:'var(--font-display)' }}>{fmtAgo(p.lastPlayed)}</div>
                  </div>
                  <div style={{ display:'flex', gap:16, alignItems:'center', flex:'0 0 auto' }}>
                    <MiniStat emoji="📚" value={p.quests||0} />
                    <MiniStat emoji="💎" value={p.lifetimeGems||0} />
                    <MiniStat emoji="🏅" value={p.goldBadges||0} />
                    <span style={{ fontSize:18, color:'var(--ink-soft)', transform:open?'rotate(90deg)':'none', transition:'transform .18s' }}>›</span>
                  </div>

                    {active ? (
                      <React.Fragment>
                        <div style={{ display:'flex', flexWrap:'wrap', gap:18, padding:'12px 2px 14px', fontSize:14, color:'var(--ink-soft)' }}>
                          <span><b style={{ color:'var(--ink)' }}>{p.bestStars||0}</b> best stars ⭐</span>
                          <span><b style={{ color:'var(--ink)' }}>{p.stickers?p.stickers.length:0}</b> stickers</span>
                          <span><b style={{ color:'var(--ink)' }}>{p.quests?Math.round((p.lifetimeGems||0)/p.quests):0}</b> avg gems / quest</span>

                        <div className="display" style={{ fontSize:13, color:'var(--purple-ink)', letterSpacing:.4,
                          textTransform:'uppercase', margin:'2px 0 8px' }}>Recent quests</div>
                        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                          {(p.stickers||[]).slice(0,6).map((st,i)=>(
                            <div key={i} style={{ display:'flex', alignItems:'center', gap:10, background:'#FAF6FF',
                              borderRadius:10, padding:'8px 12px', fontSize:14 }}>
                              <span style={{ fontSize:20 }}>{topicEmojiFor(st.topic)}</span>
                              <span style={{ flex:1, color:'var(--ink)', fontWeight:600 }}>{topicLabelFor(st.topic)}</span>
                              <span style={{ color:'var(--ink-soft)', fontSize:12.5 }}>
                                {(typeof gradeLabel==='function'?gradeLabel(st.grade):st.grade)} · {typeLabel(st.type)}
                              </span>
                              <span style={{ color:'var(--gold-deep)', letterSpacing:1 }}>{'⭐'.repeat(st.stars||0)||'•'}</span>
                            </div>
                          ))}
                        </div>
                      </React.Fragment>
                    ) : (
                      <div style={{ padding:'14px 2px', color:'var(--ink-soft)', fontSize:14 }}>
                        Hasn’t finished a quest yet on this device.
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </Stage>
  );

  );
}

Object.assign(window, { TeacherDashboard });
