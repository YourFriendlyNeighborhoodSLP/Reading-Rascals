  const pct = Math.round(gems / totalGems * 100);
  const stars = gems >= 9 ? 3 : gems >= 6 ? 2 : gems >= 3 ? 1 : 0;
  useEffect(() => {
    const t = setTimeout(() => setBurst(true), 250);
    if (!committed.current) {
      committed.current = true;
      try {const r = commitQuest({ gems, stars, grade: activity.grade, type: activity.type, topic: activity.topic });setSticker(r.sticker);} catch (e) {}
      try { setTimeout(() => playCelebrate(), 260); } catch (e) {}
    }
    return () => clearTimeout(t);
  }, []);
  const topicObj = sticker ? TOPICS.find((t) => t.id === sticker.topic) : null;
  return (
    <Stage maxWidth={680}>
      <Confetti run={burst} />
      <div style={{ textAlign: 'center', animation: 'rise .4s ease both' }}>
        <div style={{ animation: 'bob 3s ease-in-out infinite', display: 'inline-block' }}>
          <Owl size={150} mood="cheer" />
        </div>
        <h2 style={{ fontSize: 'clamp(30px,5vw,44px)', color: 'var(--head-on-bg)', margin: '8px 0 2px' }}>Quest Complete!</h2>
        <p style={{ color: 'var(--head-on-bg-soft)', fontSize: 19, margin: '0 0 18px' }}>Look how many reading gems you collected!</p>

        {/* stars */}
        <div style={{ display: 'flex', justifyContent: 'center', gap: 12, marginBottom: 18 }}>
          {[0, 1, 2].map((i) =>
          <span key={i} style={{ fontSize: 54, filter: i < stars ? 'none' : 'grayscale(1)', opacity: i < stars ? 1 : 0.3,
            animation: i < stars ? `star-pop .5s ${0.2 + i * 0.18}s ease both` : 'none' }}>⭐</span>
          )}
        </div>

        <Panel>
          {/* rainbow path filling */}
          <div style={{ position: 'relative', height: 26, borderRadius: 99, background: '#EEE6FF', overflow: 'hidden', marginBottom: 10 }}>
            <div style={{ position: 'absolute', inset: 0, width: pct + '%',
              background: 'linear-gradient(90deg,#FF5BA0,#FFC23D,#5AD6B0,#54C7F2,#7C5CFC)',
              backgroundSize: '200% 100%', borderRadius: 99, transition: 'width 1s cubic-bezier(.2,.8,.2,1)',
              animation: 'sheen 3s linear infinite' }} />
          </div>
          <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 6 }}>
            <GemPath total={totalGems} earned={gems} />
          </div>
          <p className="display" style={{ fontSize: 24, color: 'var(--pink-deep)', margin: '8px 0 0' }}>
            💎 {gems} of {totalGems} gems
          </p>
          <div style={{ display: 'flex', justifyContent: 'center', gap: 20, marginTop: 14, color: 'var(--ink-soft)', fontSize: 16, fontFamily: 'var(--font-display)' }}>
            <span>📖 Reading: <b style={{ color: 'var(--purple)' }}>{compScore}/5</b></span>
            <span>🔊 Sound games: <b style={{ color: 'var(--purple)' }}>{phonDone}/5</b></span>
          </div>

          {/* badge */}
          <div style={{ marginTop: 20, display: 'flex', justifyContent: 'center' }}>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
              background: 'linear-gradient(135deg,var(--lav-2),var(--pink-soft))', borderRadius: 24, padding: '16px 28px',
              border: '3px dashed var(--purple)', animation: 'pop-in .5s .4s ease both' }}>
              <span style={{ fontSize: 46 }}>🏅</span>
              <span className="display" style={{ color: 'var(--purple-ink)', fontSize: 18, fontWeight: 600 }}>
                {stars === 3 ? 'Gold Reader Badge!' : stars === 2 ? 'Star Reader Badge!' : 'Quest Badge Earned!'}
              </span>
            </div>
          </div>
        </Panel>

        {/* new sticker earned */}
        {topicObj &&
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12, marginTop: 18,
          background: '#fff', borderRadius: 'var(--r-md)', boxShadow: 'var(--shadow-soft)', padding: '12px 20px',
          maxWidth: 360, marginLeft: 'auto', marginRight: 'auto', animation: 'pop-in .5s .6s ease both' }}>
            <span style={{ fontSize: 38 }}>{topicObj.emoji}</span>
            <div style={{ textAlign: 'left' }}>
              <div className="display" style={{ color: 'var(--pink-deep)', fontSize: 16 }}>New sticker earned!</div>
              <div style={{ color: 'var(--ink-soft)', fontSize: 14 }}>Added to your Sticker Book {'⭐'.repeat(stars)}</div>
            </div>
          </div>
        }

        {/* play again options */}
        <h3 style={{ color: 'var(--head-on-bg)', fontSize: 22, margin: '26px 0 14px' }}>Play Again?</h3>
        <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', gap: 12 }}>
          <BigButton onClick={onReplaySame} color="pink" icon="🔄">New Story, Same Picks</BigButton>
          <BigButton onClick={onNewTopic} color="purple" icon="🌈">New Topic</BigButton>
          <BigButton onClick={onNewGrade} color="white" icon="🎒">Change Grade</BigButton>
        </div>
        <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', gap: 12, marginTop: 12 }}>
          <BigButton onClick={onPrint} color="white" size="sm" icon="🖨️">Print Worksheet</BigButton>
          <BigButton onClick={onOpenBook} color="white" size="sm" icon="⭐">My Sticker Book</BigButton>
        </div>
      </div>
    </Stage>);

}

Object.assign(window, {
  TopBar, WelcomeScreen, GradeScreen, TypeScreen, TopicScreen, LoadingScreen, PassageScreen, ScoreScreen
});
</script>
  <script type="text/babel" data-src="quiz.jsx">
// ====== COMPREHENSION + PHONEMIC + THERAPIST PANEL ======

const QTYPE_LABEL = {
  who:'Who / What / Where', detail:'Detail Detective', main:'Main Idea',
  inference:'Think & Infer', why:'Why / How', vocab:'Word Power',
};
const QTYPE_EMOJI = { who:'🔍', detail:'🧩', main:'💡', inference:'🤔', why:'❓', vocab:'📚' };
// fixed order fallback (Q1..Q5) so labels are right even if the model's type string varies
const Q_META = [
  { label:'Who / What / Where', emoji:'🔍' },
  { label:'Detail Detective',   emoji:'🧩' },
  { label:'Main Idea',          emoji:'💡' },
  { label:'Think & Infer',      emoji:'🤔' },
  { label:'Word Power',         emoji:'📚' },
];

// little owl + speech feedback
function OwlSays({ text, mood='happy' }){
  if(!text) return null;
  return (
    <div style={{ display:'flex', alignItems:'center', gap:12, marginTop:16, animation:'pop-in .3s ease both' }}>
      <Owl size={66} mood={mood} />
      <SpeechBubble style={{ fontSize:18 }}>{text}</SpeechBubble>
    </div>
  );
}

// passage re-read modal
function PassageModal({ activity, onClose }){
  return (
    <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(60,42,110,.45)',
      zIndex:80, display:'grid', placeItems:'center', padding:20, animation:'pop-in .2s ease both' }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:'#fff', borderRadius:'var(--r-lg)',
        maxWidth:680, width:'100%', maxHeight:'82vh', overflow:'auto', boxShadow:'var(--shadow-card)' }}>
        <div style={{ position:'sticky', top:0, background:'linear-gradient(120deg,var(--purple),var(--pink))',
          color:'#fff', padding:'16px 24px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <h3 style={{ margin:0, fontSize:22 }}>📖 {activity.title}</h3>
          <button onClick={onClose} style={{ background:'rgba(255,255,255,.25)', color:'#fff', width:38, height:38,
            borderRadius:'50%', fontSize:20 }}>✕</button>
        </div>
        <div style={{ padding:'22px 28px' }}>
          {activity.paragraphs.map((p,i)=>(
            <p key={i} style={{ fontSize:20, lineHeight:1.7, fontWeight:600, margin:'0 0 14px', color:'var(--ink)' }}>{p}</p>
          ))}
        </div>
      </div>
    </div>
  );
}

// robust phonemic skill label (model's "skill" string varies)
function phonMeta(t, idx){
  const k = String(t.skill||'').toLowerCase();
  if(k.includes('substitut')) return { label:'Sound Substitution', emoji:'🔄' };
  if(k.includes('delet'))     return { label:'Sound Deletion', emoji:'✂️' };
  if(k.includes('addit'))     return { label:'Sound Addition', emoji:'➕' };
  if(k.includes('segment'))   return { label:'Tell the Sounds', emoji:'🎯' };
  if(k.includes('blend'))     return { label:'Blend the Sounds', emoji:'🔗' };
  if(k.includes('manipul')||k.includes('switch')) return { label:'Sound Switch', emoji:'🪄' };
  const fb=[{label:'Sound Substitution',emoji:'🔄'},{label:'Sound Deletion',emoji:'✂️'},{label:'Sound Addition',emoji:'➕'},{label:'Blend the Sounds',emoji:'🔗'},{label:'Sound Switch',emoji:'🪄'}];
  return fb[idx]||{ label:'Sound Play', emoji:'🎵' };
}

// ---------- Comprehension questions ----------
function QuestionsScreen({ activity, showKey, onComplete, onAward, onHome, gems, totalGems }){
  const questions = activity.comprehension;
  const [idx, setIdx] = useState(0);
  const [state, setState] = useState(()=>questions.map(()=>({ solved:false, picked:null, text:'', responded:false, feedback:'', mood:'happy', showCue:false })));
  const [showPassage, setShowPassage] = useState(false);
  const awarded = useRef(new Set());
  const q = questions[idx];
  const s = state[idx];
  const meta = Q_META[idx] || { label:'Question', emoji:'❓' };

  function update(patch){ setState(prev=>prev.map((x,i)=>i===idx?{...x,...patch}:x)); }
  function award(){ if(!awarded.current.has(idx)){ awarded.current.add(idx); onAward(); } }

  function pickChoice(i){
    if(s.solved) return;
    if(i===q.answer){
      update({ solved:true, picked:i, feedback:pick(FEEDBACK.correct), mood:'cheer' });
      award();
    } else {
      update({ picked:i, feedback:pick(FEEDBACK.retry), mood:'happy', showCue:true });
    }
  }
  function respondOpen(viaVoice){
    if(s.solved) return;
    if(!viaVoice && !s.text.trim()) return;
    update({ solved:true, responded:true, feedback:pick(FEEDBACK.open), mood:'cheer' });
    award();
  }

  const isLast = idx===questions.length-1;
  const canNext = s.solved;
  function next(){
    if(isLast){ onComplete(state.filter(x=>x.solved).length + (s.solved?0:0)); return; }
    setIdx(idx+1);
  }
  // recompute solved count live
  const solvedCount = state.filter(x=>x.solved).length;

  return (
    <Stage maxWidth={720}>
      {showPassage && <PassageModal activity={activity} onClose={()=>setShowPassage(false)} />}
      <TopBar gems={gems} totalGems={totalGems} onHome={onHome} />

      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12, flexWrap:'wrap', gap:10 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, flexShrink:0 }}>
          <span style={{ fontSize:30 }}>{meta.emoji}</span>
          <div>
            <div className="display" style={{ fontSize:13, color:'#FF9BCB', letterSpacing:1, textTransform:'uppercase', whiteSpace:'nowrap' }}>
              {meta.label}
            </div>
            <div className="display" style={{ fontSize:20, color:'var(--head-on-bg)', whiteSpace:'nowrap' }}>Question {idx+1} of {questions.length}</div>
          </div>
        </div>
        <button onClick={()=>setShowPassage(true)} style={{ background:'#fff', color:'var(--purple)',
          borderRadius:999, padding:'10px 18px', boxShadow:'var(--shadow-soft)', fontSize:16,
          display:'flex', alignItems:'center', gap:8 }}>📖 Read story again</button>
      </div>

      <Panel>
        <p style={{ fontSize:'clamp(21px,2.6vw,26px)', color:'var(--purple-ink)', fontWeight:600,
          margin:'0 0 20px', fontFamily:'var(--font-display)', textWrap:'pretty' }}>{q.q}</p>

        {q.kind==='mc' ? (
          <div style={{ display:'grid', gap:12 }}>
            {q.choices && q.choices.map((c,i)=>{
              const isAns = i===q.answer;
              const picked = s.picked===i;
              let bg='#fff', border='#EFE7FF', fg='var(--ink)';
              if(s.solved && isAns){ bg='#E8FBF2'; border='var(--ok)'; fg='var(--ok-deep)'; }
              else if(picked && !isAns){ bg='#FFECF3'; border='var(--pink)'; fg='var(--pink-deep)'; }
              else if(showKey && isAns){ border='var(--ok)'; }
              return (
                <button key={i} onClick={()=>pickChoice(i)} disabled={s.solved}
                  style={{ display:'flex', alignItems:'center', gap:14, textAlign:'left',
                    background:bg, border:`3px solid ${border}`, borderRadius:'var(--r-sm)', padding:'14px 16px',
                    fontFamily:'var(--font-body)', fontWeight:700, fontSize:19, color:fg,
                    cursor:s.solved?'default':'pointer', transition:'all .15s',
                    boxShadow: picked||(s.solved&&isAns)?'var(--shadow-soft)':'none' }}>
                  <span style={{ width:34, height:34, borderRadius:'50%', flexShrink:0, display:'grid', placeItems:'center',
                    background: (s.solved&&isAns)?'var(--ok)':(picked&&!isAns)?'var(--pink)':'var(--lav-2)',
                    color:(s.solved&&isAns)||(picked&&!isAns)?'#fff':'var(--purple)', fontFamily:'var(--font-display)', fontSize:17 }}>
                    {(s.solved&&isAns)?'✓':(picked&&!isAns)?'✕':String.fromCharCode(65+i)}
                  </span>
                  <span style={{ textWrap:'pretty' }}>{c}</span>
                  {showKey && isAns && !s.solved && <span style={{ marginLeft:'auto', fontSize:13, color:'var(--ok-deep)', fontFamily:'var(--font-display)' }}>answer</span>}
                </button>
              );
            })}
          </div>
        ) : (
          <div>
            <textarea value={s.text} disabled={s.solved} onChange={e=>update({ text:e.target.value })}
              placeholder="Type your answer here… or tap the mic to tell it out loud!"
              rows={3} style={{ width:'100%', borderRadius:'var(--r-sm)', border:'3px solid #EFE7FF',
                padding:'14px 16px', fontSize:19, fontFamily:'var(--font-body)', fontWeight:600, color:'var(--ink)',
                resize:'vertical', outline:'none', background: s.solved?'#F7F3FF':'#fff' }} />
            <div style={{ display:'flex', gap:12, marginTop:12, flexWrap:'wrap' }}>
              <BigButton onClick={()=>respondOpen(false)} color="purple" size="sm" disabled={s.solved}>Check my answer</BigButton>
              <BigButton onClick={()=>respondOpen(true)} color="white" size="sm" disabled={s.solved} icon="🎤">I'll tell it out loud</BigButton>
            </div>
          </div>
        )}

        {/* hint / cue */}
        {!s.solved && (
          <button onClick={()=>update({ showCue:!s.showCue })} style={{ marginTop:16, background:'none', color:'var(--purple)',
            fontFamily:'var(--font-display)', fontSize:16, display:'flex', alignItems:'center', gap:6 }}>
            💡 {s.showCue?'Hide hint':'Need a hint?'}
          </button>
        )}
        {s.showCue && !s.solved && (
          <div style={{ marginTop:8, background:'var(--lav-2)', borderRadius:14, padding:'12px 16px',
            color:'var(--purple-ink)', fontSize:17, fontWeight:700, animation:'pop-in .2s ease both' }}>
            {q.cue}
          </div>
        )}

        {/* answer key box for therapist */}
        {showKey && (
          <div style={{ marginTop:16, background:'#FFF7E8', border:'2px dashed var(--gold-deep)', borderRadius:14, padding:'12px 16px' }}>
            <div className="display" style={{ fontSize:13, color:'var(--gold-deep)', letterSpacing:1, textTransform:'uppercase', marginBottom:4 }}>🔑 Answer Key</div>
            <div style={{ fontSize:17, color:'var(--ink)', fontWeight:700 }}>
              {q.kind==='mc' ? `Correct: ${q.choices?q.choices[q.answer]:''}` : `Model answer: ${q.answer}`}
            </div>
            <div style={{ fontSize:15, color:'var(--ink-soft)', marginTop:4 }}>Cue: “{q.cue}”</div>
          </div>
        )}
      </Panel>

      <OwlSays text={s.feedback} mood={s.mood} />

      <div style={{ display:'flex', justifyContent:'flex-end', marginTop:20 }}>
        <BigButton onClick={next} color="pink" size="lg" disabled={!canNext} icon={isLast?'🔊':'→'}>
          {isLast?'Sound Games!':'Next Question'}
        </BigButton>
      </div>
    </Stage>
  );
}

// ---------- Phonemic awareness ----------
function PhonemicScreen({ activity, showKey, onComplete, onAward, onHome, gems, totalGems }){
  const tasks = activity.phonemic;
  const [idx, setIdx] = useState(0);
  const [state, setState] = useState(()=>tasks.map(()=>({ done:false, revealed:false, showCue:false, cue:pick(PHON_CUES) })));
  const awarded = useRef(new Set());
  const t = tasks[idx];
  const s = state[idx];
  const pm = phonMeta(t, idx);

  function update(patch){ setState(prev=>prev.map((x,i)=>i===idx?{...x,...patch}:x)); }
  function gotIt(){
    if(!awarded.current.has(idx)){ awarded.current.add(idx); onAward(); }
    update({ done:true });
  }
  function speak(){
    try{
      const w = (t.answer||'').replace(/\//g,' ');
      const u = new SpeechSynthesisUtterance(w);
      u.rate = 0.7; u.pitch = 1.1;
      speechSynthesis.cancel(); speechSynthesis.speak(u);
    }catch(e){}
  }
  const isLast = idx===tasks.length-1;
  function next(){ if(isLast){ onComplete(state.filter(x=>x.done).length + (s.done?0:0)); return; } setIdx(idx+1); }

  return (
    <Stage maxWidth={680}>
      <TopBar gems={gems} totalGems={totalGems} onHome={onHome} />

      <div style={{ textAlign:'center', marginBottom:14 }}>
        <div style={{ display:'inline-flex', alignItems:'center', gap:10, background:'#fff', borderRadius:999,
          padding:'8px 20px', boxShadow:'var(--shadow-soft)' }}>
          <span style={{ fontSize:24 }}>🔊</span>
          <span className="display" style={{ color:'var(--purple-ink)', fontSize:18, whiteSpace:'nowrap' }}>Sound Game {idx+1} of {tasks.length}</span>
        </div>
      </div>

      <Panel style={{ textAlign:'center' }}>
        <div style={{ display:'inline-flex', alignItems:'center', gap:8, background:'var(--pink-soft-2)',
          borderRadius:999, padding:'6px 16px', marginBottom:18 }}>
          <span style={{ fontSize:20 }}>{pm.emoji}</span>
          <span className="display" style={{ color:'var(--pink-deep)', fontSize:15, letterSpacing:.5 }}>{pm.label}</span>
        </div>

        <p style={{ fontSize:'clamp(23px,3.2vw,30px)', color:'var(--purple-ink)', fontWeight:600,
          lineHeight:1.5, fontFamily:'var(--font-display)', margin:'0 0 8px', textWrap:'pretty' }}
          dangerouslySetInnerHTML={{ __html: t.prompt }} />

        <p style={{ color:'var(--ink-soft)', fontSize:16, margin:'0 0 18px' }}>Say it out loud with your grown-up! 🗣️</p>

        {/* revealed answer */}
        {(s.revealed || showKey) && (
          <div style={{ background:'#E8FBF2', border:'3px solid var(--ok)', borderRadius:'var(--r-md)',
            padding:'16px 20px', margin:'0 auto 16px', maxWidth:380, animation:'pop-in .25s ease both' }}>
            <div className="display" style={{ fontSize:13, color:'var(--ok-deep)', letterSpacing:1, textTransform:'uppercase' }}>The answer is</div>
            <div className="display" style={{ fontSize:34, color:'var(--ok-deep)', fontWeight:700 }}>{t.answer}</div>
            <button onClick={speak} style={{ marginTop:6, background:'var(--ok)', color:'#fff', borderRadius:999,
              padding:'6px 16px', fontSize:15, display:'inline-flex', alignItems:'center', gap:6 }}>🔊 Hear it</button>
          </div>
        )}

        {/* therapist note */}
        {showKey && (
          <div style={{ background:'#FFF7E8', border:'2px dashed var(--gold-deep)', borderRadius:14,
            padding:'12px 16px', margin:'0 auto 16px', maxWidth:420, textAlign:'left' }}>
            <div className="display" style={{ fontSize:13, color:'var(--gold-deep)', letterSpacing:1, textTransform:'uppercase', marginBottom:4 }}>🔑 Therapist Note</div>
            <div style={{ fontSize:16, color:'var(--ink)', fontWeight:600 }}>{t.note}</div>
          </div>
        )}

        {/* cue */}
        {s.showCue && !s.revealed && (
          <div style={{ background:'var(--lav-2)', borderRadius:14, padding:'10px 16px', margin:'0 auto 16px',
            maxWidth:380, color:'var(--purple-ink)', fontSize:17, fontWeight:700, animation:'pop-in .2s ease both' }}>
            💡 {s.cue}
          </div>
        )}

        <div style={{ display:'flex', flexWrap:'wrap', justifyContent:'center', gap:10 }}>
          {!s.revealed && <BigButton onClick={()=>update({ showCue:!s.showCue })} color="white" size="sm" icon="💡">{s.showCue?'Hide hint':'Hint'}</BigButton>}
          {!s.revealed && <BigButton onClick={()=>update({ revealed:true })} color="purple" size="sm" icon="👀">Show answer</BigButton>}
          <BigButton onClick={gotIt} color="mint" size="sm" disabled={s.done} icon={s.done?'✅':'⭐'}>{s.done?'Got it!':'I got it!'}</BigButton>
        </div>
      </Panel>

      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:20 }}>
        <FloatingOwl size={70} mood="happy" />
        <BigButton onClick={next} color="pink" size="lg" disabled={!s.done} icon={isLast?'🏆':'→'}>
          {isLast?'See My Gems!':'Next Sound'}
        </BigButton>
      </div>
    </Stage>
  );
}

Object.assign(window, { QuestionsScreen, PhonemicScreen, OwlSays, PassageModal });

</script>
  <script type="text/babel" data-src="therapist.jsx">
// ====== THERAPIST / TEACHER CONTROLS ======

// floating gear button
function TherapistButton({ onClick }){
  return (
    <button onClick={onClick} title="Grown-up settings" style={{ position:'fixed', right:18, bottom:18, zIndex:70,
      width:56, height:56, borderRadius:'50%', background:'#fff', boxShadow:'0 8px 22px -6px rgba(91,51,214,.5)',
      fontSize:26, display:'grid', placeItems:'center' }}>⚙️</button>
  );
}

// simple grown-up gate
function Gate({ onPass, onClose }){
  const a = 6, b = 4; // 6 + 4 = 10
  const opts = [9, 10, 12].sort(()=>Math.random()-0.5);
  return (
    <Overlay onClose={onClose}>
      <div style={{ textAlign:'center', maxWidth:360 }}>
        <div style={{ fontSize:40 }}>🔒</div>
        <h3 style={{ color:'var(--purple-ink)', fontSize:24, margin:'6px 0 4px' }}>Grown-ups only</h3>
        <p style={{ color:'var(--ink-soft)', fontSize:16, margin:'0 0 18px' }}>Tap the answer to unlock settings:</p>
        <div className="display" style={{ fontSize:30, color:'var(--pink-deep)', marginBottom:16 }}>{a} + {b} = ?</div>
        <div style={{ display:'flex', gap:12, justifyContent:'center' }}>
          {opts.map(o=>(
            <button key={o} onClick={()=>o===a+b?onPass():null} style={{ width:64, height:64, borderRadius:18,
              background:'var(--lav-2)', color:'var(--purple-ink)', fontFamily:'var(--font-display)', fontSize:26,
              boxShadow:'var(--shadow-soft)' }}>{o}</button>
          ))}
        </div>
      </div>
    </Overlay>
  );
}

function Overlay({ children, onClose, wide }){
  return (
    <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(60,42,110,.5)', zIndex:75,
      display:'grid', placeItems:'center', padding:18, animation:'pop-in .2s ease both' }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:'#fff', borderRadius:'var(--r-lg)', padding:26,
        width:'100%', maxWidth: wide?560:420, maxHeight:'88vh', overflow:'auto', boxShadow:'var(--shadow-card)' }}>
        {children}
      </div>
    </div>
  );
}

// segmented control
function Segmented({ value, options, onChange }){
  return (
    <div style={{ display:'flex', background:'var(--lav-2)', borderRadius:14, padding:4, gap:4, flexWrap:'wrap' }}>
      {options.map(o=>(
        <button key={o.id} onClick={()=>onChange(o.id)} style={{ flex:'1 1 auto', minWidth:80, padding:'10px 12px',
          borderRadius:11, fontFamily:'var(--font-display)', fontSize:15, transition:'all .15s',
          background: value===o.id?'#fff':'transparent', color: value===o.id?'var(--purple-deep)':'var(--ink-soft)',
          boxShadow: value===o.id?'var(--shadow-soft)':'none' }}>{o.label}</button>
      ))}
    </div>
  );
}

function Field({ label, children }){
  return (
    <div style={{ marginBottom:18 }}>
      <div className="display" style={{ fontSize:14, color:'var(--purple-ink)', letterSpacing:.5,
        textTransform:'uppercase', marginBottom:8 }}>{label}</div>
      {children}
    </div>
  );
}

function TherapistPanel({ settings, onChange, onRegenerate, onClose, activity, onPrint }){
  const [tab, setTab] = useState('settings'); // settings | key
  return (
    <Overlay onClose={onClose} wide>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
        <h3 style={{ margin:0, color:'var(--purple-ink)', fontSize:24, display:'flex', alignItems:'center', gap:10 }}>
          <span>🧑‍🏫</span> Teacher / Therapist
        </h3>
        <button onClick={onClose} style={{ background:'var(--lav-2)', color:'var(--purple)', width:40, height:40,
          borderRadius:'50%', fontSize:20 }}>✕</button>
      </div>

      <div style={{ display:'flex', gap:8, marginBottom:18 }}>
        <Segmented value={tab} onChange={setTab} options={[
          { id:'settings', label:'Settings' }, { id:'key', label:'Answer Key' },
        ]} />
      </div>

      {tab==='settings' ? (
        <div>
          <Field label="Grade level">
            <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8 }}>
              {GRADES.map(g=>(
                <button key={g.id} onClick={()=>onChange({ grade:g.id })} style={{ padding:'10px 6px', borderRadius:12,
                  fontFamily:'var(--font-display)', fontSize:14, border:`2px solid ${settings.grade===g.id?'var(--purple)':'#EFE7FF'}`,
                  background: settings.grade===g.id?'var(--lav-2)':'#fff', color:'var(--purple-ink)' }}>{g.emoji} {g.label}</button>
              ))}
            </div>
          </Field>

          <Field label="Story type">
            <Segmented value={settings.type} onChange={v=>onChange({ type:v })} options={[
              { id:'fiction', label:'🐉 Fiction' }, { id:'nonfiction', label:'🔎 Non-fiction' },
            ]} />
          </Field>

          <Field label="Topic">
            <select value={settings.topic} onChange={e=>onChange({ topic:e.target.value })}
              style={{ width:'100%', padding:'12px 14px', borderRadius:12, border:'2px solid #EFE7FF',
                fontFamily:'var(--font-body)', fontWeight:700, fontSize:16, color:'var(--ink)', background:'#fff' }}>
              {TOPICS.map(t=><option key={t.id} value={t.id}>{t.emoji}  {t.label}</option>)}
            </select>
          </Field>

          <Field label="Question format">
            <Segmented value={settings.questionMode} onChange={v=>onChange({ questionMode:v })} options={[
              { id:'auto', label:'Auto (by grade)' }, { id:'mc', label:'Multiple choice' }, { id:'open', label:'Open response' },
            ]} />
          </Field>

          <Field label="Phonemic words">
            <Segmented value={settings.phonSource} onChange={v=>onChange({ phonSource:v })} options={[
              { id:'passage', label:'Passage words' }, { id:'mixed', label:'Mixed words' },
            ]} />
          </Field>

          <Field label="Answer key">
            <Segmented value={settings.showKey?'on':'off'} onChange={v=>onChange({ showKey:v==='on' })} options={[
              { id:'off', label:'Hidden' }, { id:'on', label:'Revealed' },
            ]} />
          </Field>

          <div style={{ display:'flex', gap:10, marginTop:8, flexWrap:'wrap' }}>
            <BigButton onClick={onRegenerate} color="pink" icon="🔄">Regenerate Passage</BigButton>
            {onPrint && <BigButton onClick={onPrint} color="purple" icon="🖨️">Print</BigButton>}
            <BigButton onClick={onClose} color="white">Done</BigButton>
          </div>
        </div>
      ) : (
        <AnswerKeyView activity={activity} />
      )}
    </Overlay>
  );
}

function AnswerKeyView({ activity }){
  if(!activity || !activity.comprehension){
    return <p style={{ color:'var(--ink-soft)', fontSize:16 }}>Generate a passage first to see the answer key.</p>;
  }
  return (
    <div>
      <h4 className="display" style={{ color:'var(--pink-deep)', fontSize:17, margin:'4px 0 10px' }}>📖 Comprehension</h4>
      {activity.comprehension.map((q,i)=>(
        <div key={i} style={{ background:'#FAF6FF', borderRadius:12, padding:'12px 14px', marginBottom:8 }}>
          <div style={{ fontWeight:800, fontSize:16, color:'var(--purple-ink)' }}>{i+1}. {q.q}</div>
          <div style={{ fontSize:15, color:'var(--ok-deep)', marginTop:4, fontWeight:700 }}>
            ✓ {q.kind==='mc' ? (q.choices?q.choices[q.answer]:'') : q.answer}
          </div>
          <div style={{ fontSize:14, color:'var(--ink-soft)', marginTop:2 }}>Cue: “{q.cue}”</div>
        </div>
      ))}
      <h4 className="display" style={{ color:'var(--pink-deep)', fontSize:17, margin:'16px 0 10px' }}>🔊 Phonemic Awareness</h4>
      {activity.phonemic.map((t,i)=>(
        <div key={i} style={{ background:'#FAF6FF', borderRadius:12, padding:'12px 14px', marginBottom:8 }}>
          <div style={{ fontWeight:800, fontSize:16, color:'var(--purple-ink)' }} dangerouslySetInnerHTML={{ __html:`${i+1}. ${t.prompt}` }} />
          <div style={{ fontSize:15, color:'var(--ok-deep)', marginTop:4, fontWeight:700 }}>✓ {t.answer}</div>
          <div style={{ fontSize:14, color:'var(--ink-soft)', marginTop:2 }}>{t.note}</div>
        </div>
      ))}
    </div>
  );
}

Object.assign(window, { TherapistButton, Gate, TherapistPanel, Overlay, Segmented });

</script>
  <script type="text/babel" data-src="app.jsx">
// ====== APP: state machine wiring everything together ======

const TOTAL_GEMS = 10;
const DEFAULT_SETTINGS = { grade:'', type:'', topic:'', questionMode:'auto', phonSource:'passage', showKey:false };

function loadSettings(){
  try { const s = JSON.parse(localStorage.getItem('ppq_settings')||'null'); if(s) return { ...DEFAULT_SETTINGS, ...s, grade:'', type:'', topic:'' }; } catch(e){}
  return { ...DEFAULT_SETTINGS };
}

function App(){
  const [student, setStudent] = useState(getActiveStudent);
  const [stage, setStage] = useState(student ? 'welcome' : 'signin');
  const [settings, setSettings] = useState(loadSettings);
  const [activity, setActivity] = useState(null);
  const [gems, setGems] = useState(0);
  const [compScore, setCompScore] = useState(0);
  const [phonScore, setPhonScore] = useState(0);

  const [gateOpen, setGateOpen] = useState(false);
  const [gatePassed, setGatePassed] = useState(false);
  const [panelOpen, setPanelOpen] = useState(false);
  const [printMenu, setPrintMenu] = useState(false);
  const [printKey, setPrintKey] = useState(true);
  const [resume, setResume] = useState(()=>loadSession());
  const genId = useRef(0);

  useEffect(()=>{
    try { localStorage.setItem('ppq_settings', JSON.stringify({ questionMode:settings.questionMode, phonSource:settings.phonSource, showKey:settings.showKey })); } catch(e){}
  },[settings.questionMode, settings.phonSource, settings.showKey]);

  // persist in-progress quest so a refresh can resume
  useEffect(()=>{
    if(['passage','questions','phonemic'].includes(stage) && activity){
      saveSession({ stage, settings, activity, gems, compScore, phonScore, title:activity.title });
    }
  },[stage, activity, gems, compScore, phonScore]);

  function patch(p){ setSettings(s=>({ ...s, ...p })); }

  async function startGenerate(useSettings){
    const cfg = useSettings || settings;
    const myId = ++genId.current;
    setResume(null); clearSession();
    setGems(0); setCompScore(0); setPhonScore(0);
    setStage('loading');
    let act;
    try { act = await generateActivity(cfg); }
    catch(e){ act = { ...FALLBACK, grade:cfg.grade, type:cfg.type, topic:cfg.topic, fromFallback:true }; }
    if(myId!==genId.current) return; // superseded
    setActivity(act);
    setStage('passage');
  }

  function resumeQuest(){
    const s = loadSession(); if(!s) return;
    setSettings(s.settings||DEFAULT_SETTINGS);
    setActivity(s.activity);
    setGems(s.gems||0); setCompScore(s.compScore||0); setPhonScore(s.phonScore||0);
    setResume(null);
    setStage(s.stage||'passage');
  }

  function goHome(){ clearSession(); setResume(null); setStage('welcome'); }
  function award(){ try{ playGem(); }catch(_){ } setGems(g=>Math.min(TOTAL_GEMS, g+1)); }

  // ---- student login / logout ----
  function signIn(s){
    setStudent(s);
    setActivity(null); setGems(0); setCompScore(0); setPhonScore(0);
    setResume(loadSession());      // that student's saved quest, if any
    setStage('welcome');
  }
  function logOut(){
    setActiveId('');
    setStudent(null);
    setActivity(null); setGems(0); setCompScore(0); setPhonScore(0);
    setResume(null);
    setStage('signin');
  }

  function openTherapist(){ if(gatePassed){ setPanelOpen(true); } else { setGateOpen(true); } }
  function regenerate(){ setPanelOpen(false); startGenerate(); }
  function doPrint(withKey){ setPrintKey(withKey); setPrintMenu(false); setTimeout(()=>{ try{ window.print(); }catch(e){} }, 150); }

  // ---- routing ----
  let screen;
  if(stage==='signin'){
    screen = <SignInScreen onSignIn={signIn} />;
  } else if(stage==='welcome'){
    screen = <WelcomeScreen onStart={()=>setStage('grade')} onOpenBook={()=>setStage('book')}
      resume={resume} onResume={resumeQuest} student={student} onSwitch={logOut} />;
  } else if(stage==='book'){
    screen = <StickerBook onClose={()=>setStage('welcome')} onStart={()=>setStage('grade')} />;
  } else if(stage==='grade'){
    screen = <GradeScreen value={settings.grade} onPick={g=>patch({ grade:g })}
      onBack={()=>setStage('welcome')} onNext={()=>setStage('type')} />;
  } else if(stage==='type'){
    screen = <TypeScreen value={settings.type} onPick={t=>patch({ type:t })}
      onBack={()=>setStage('grade')} onNext={()=>setStage('topic')} />;
  } else if(stage==='topic'){
    screen = <TopicScreen value={settings.topic} onPick={t=>patch({ topic:t })}
      onBack={()=>setStage('type')} onNext={()=>startGenerate()} />;
  } else if(stage==='loading'){
    screen = <LoadingScreen grade={settings.grade} type={settings.type} topic={settings.topic} />;
  } else if(stage==='passage'){
    screen = <PassageScreen activity={activity} gems={gems} totalGems={TOTAL_GEMS}
      showKey={settings.showKey} onHome={goHome} onContinue={()=>setStage('questions')}
      onPrint={()=>setPrintMenu(true)} />;
  } else if(stage==='questions'){
    screen = <QuestionsScreen activity={activity} showKey={settings.showKey} gems={gems} totalGems={TOTAL_GEMS}
      onAward={award} onHome={goHome}
      onComplete={(sc)=>{ setCompScore(sc); setStage('phonemic'); }} />;
  } else if(stage==='phonemic'){
    screen = <PhonemicScreen activity={activity} showKey={settings.showKey} gems={gems} totalGems={TOTAL_GEMS}
      onAward={award} onHome={goHome}
      onComplete={(sc)=>{ setPhonScore(sc); clearSession(); setStage('score'); }} />;
  } else if(stage==='score'){
    screen = <ScoreScreen activity={activity} gems={gems} totalGems={TOTAL_GEMS} compScore={compScore} phonDone={phonScore}
      onReplaySame={()=>startGenerate()} onNewTopic={()=>setStage('topic')} onNewGrade={()=>setStage('grade')}
      onHome={goHome} onPrint={()=>setPrintMenu(true)} onOpenBook={()=>setStage('book')} />;
  }

  return (
    <React.Fragment>
      <div className="no-print">
        {screen}
        <AppWatermark />
        {stage!=='signin' && <TherapistButton onClick={openTherapist} />}
        {stage!=='signin' && <SoundToggle />}
        {gateOpen && <Gate onClose={()=>setGateOpen(false)} onPass={()=>{ setGateOpen(false); setGatePassed(true); setPanelOpen(true); }} />}
        {panelOpen && (
          <TherapistPanel settings={settings} activity={activity}
            onChange={patch} onRegenerate={regenerate} onClose={()=>setPanelOpen(false)}
            onPrint={()=>{ setPanelOpen(false); setPrintMenu(true); }} />
        )}
        {printMenu && <PrintMenu onPrint={doPrint} onClose={()=>setPrintMenu(false)} />}
      </div>
      <div className="print-area" id="print-area">
        {activity && <Worksheet activity={activity} includeKey={printKey} />}
      </div>
    </React.Fragment>
  );
}

// soft brand watermark shown in the corner of every app screen (not printed)
function AppWatermark(){
  return (
    <img className="no-print" src={window.__LOGO} alt="" aria-hidden="true"
      style={{ position:'fixed', left:16, bottom:16, zIndex:40, width:74, height:74,
        borderRadius:'50%', opacity:0.16, pointerEvents:'none',
        filter:'drop-shadow(0 4px 10px rgba(0,0,0,.35))' }} />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>

  .twk-swatch::-webkit-color-swatch{border:0;border-radius:5.5px}
  .twk-swatch::-moz-color-swatch{border:0;border-radius:5.5px}

  .twk-chips{display:flex;gap:6px}
  .twk-chip{position:relative;appearance:none;flex:1;min-width:0;height:46px;
    padding:0;border:0;border-radius:6px;overflow:hidden;cursor:default;
    box-shadow:0 0 0 .5px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.06);
    transition:transform .12s cubic-bezier(.3,.7,.4,1),box-shadow .12s}
  .twk-chip:hover{transform:translateY(-1px);
    box-shadow:0 0 0 .5px rgba(0,0,0,.18),0 4px 10px rgba(0,0,0,.12)}
  .twk-chip[data-on="1"]{box-shadow:0 0 0 1.5px rgba(0,0,0,.85),
    0 2px 6px rgba(0,0,0,.15)}
  .twk-chip>span{position:absolute;top:0;bottom:0;right:0;width:34%;
    display:flex;flex-direction:column;box-shadow:-1px 0 0 rgba(0,0,0,.1)}
  .twk-chip>span>i{flex:1;box-shadow:0 -1px 0 rgba(0,0,0,.1)}
  .twk-chip>span>i:first-child{box-shadow:none}
  .twk-chip svg{position:absolute;top:6px;left:6px;width:13px;height:13px;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
`;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
  <script type="text/babel" data-src="tweaks.jsx">
// ====== TWEAKS: recolor the whole app from "Your Friendly Neighborhood SLP" logo ======
// Palettes are sampled from the brand logo: deep royal purple, navy ink,
// vibrant magenta/pink, and gold. Each control writes CSS custom properties on
// :root, which every screen already consumes — so changes ripple everywhere.

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "Classic",
  "purple": ["#7C5CFC", "#5B33D6", "#3C2A6E"],
  "pink": ["#FF5BA0", "#F0388A", "#FFD6EC", "#FFE9F4"],
  "gold": ["#FFC23D", "#F1A21B"],
  "bg": ["#1C1046", "#C42E96", "#7A3AE6", "#3A2270"]
}/*EDITMODE-END*/;

// ---- option sets (all drawn from the logo) ----
const PURPLES = [
  ["#7C5CFC", "#5B33D6", "#3C2A6E"], // royal (logo books)
  ["#6B3FD4", "#4A1E8C", "#2A1A5E"], // deep grape (logo background)
  ["#9B7BFF", "#6F4FE6", "#473270"]  // soft violet
];
const PINKS = [
  ["#FF5BA0", "#F0388A", "#FFD6EC", "#FFE9F4"], // magenta (logo script)
  ["#FF4FB0", "#E5379A", "#FFD3EC", "#FFE7F5"], // hot bubblegum
  ["#FF6F86", "#F0426B", "#FFD9DF", "#FFEAEF"]  // coral
];
const GOLDS = [
  ["#FFC23D", "#F1A21B"], // gold (logo accents)
  ["#FFA83D", "#F5821B"], // sunset orange
  ["#FFD24D", "#F2B521"]  // honey
];
const BGS = [
  ["#1C1046", "#C42E96", "#7A3AE6", "#3A2270"], // cosmic purple (default, from mascot)
  ["#241048", "#D6457A", "#9A3AE6", "#46226E"], // berry nebula
  ["#141033", "#B83A93", "#5E3CC9", "#2A2160"], // deep space
  ["#101A38", "#3E7FC9", "#6E3CC9", "#26285E"]  // blue galaxy
];

// coordinated presets — one tap sets every group at once
const PRESETS = {
  Classic: { purple: PURPLES[0], pink: PINKS[0], gold: GOLDS[0], bg: BGS[0] },
  Magenta: { purple: PURPLES[2], pink: PINKS[1], gold: GOLDS[2], bg: BGS[1] },
  Grape:   { purple: PURPLES[1], pink: PINKS[2], gold: GOLDS[1], bg: BGS[2] }
};

function applyTheme(t) {
  const r = document.documentElement.style;
  const set = (k, v) => v && r.setProperty(k, v);
  const [p, pd, pi] = t.purple || [];
  set('--purple', p); set('--purple-deep', pd); set('--purple-ink', pi);
  const [pk, pkd, pks, pks2] = t.pink || [];
  set('--pink', pk); set('--pink-deep', pkd);
  set('--pink-soft', pks); set('--pink-soft-2', pks2);
  const [g, gd] = t.gold || [];
  set('--gold', g); set('--gold-deep', gd);
  const [base, g1, g2, g3] = t.bg || [];
  set('--bg-base', base); set('--bg-glow-1', g1);
  set('--bg-glow-2', g2); set('--bg-glow-3', g3);
}

function TweaksApp() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // apply on mount + whenever any color group changes (persists with panel closed)
  React.useEffect(() => { applyTheme(t); },
    [t.purple, t.pink, t.gold, t.bg]);

  const pickPreset = (name) => {
    const p = PRESETS[name];
    if (!p) return;
    setTweak({ theme: name, ...p });
  };

  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Brand theme" />
      <TweakRadio label="Preset" value={t.theme}
        options={['Classic', 'Magenta', 'Grape']}
        onChange={pickPreset} />

      <TweakSection label="Fine-tune (from your logo)" />
      <TweakColor label="Purple" value={t.purple} options={PURPLES}
        onChange={(v) => setTweak('purple', v)} />
      <TweakColor label="Pink" value={t.pink} options={PINKS}
        onChange={(v) => setTweak('pink', v)} />
      <TweakColor label="Gold" value={t.gold} options={GOLDS}
        onChange={(v) => setTweak('gold', v)} />

      <TweakSection label="Background" />
      <TweakColor label="Cosmos" value={t.bg} options={BGS}
        onChange={(v) => setTweak('bg', v)} />
    </TweaksPanel>
  );
}

ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<TweaksApp />);

</script>
</body>
